name: Snyk Security Monitor

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Monitor — server
        working-directory: server
        run: snyk monitor --project-name=ricci-server --org=${{ secrets.SNYK_ORG_ID }}
        continue-on-error: true

      - name: Snyk Monitor — client
        working-directory: client
        run: snyk monitor --project-name=ricci-client --org=${{ secrets.SNYK_ORG_ID }}
        continue-on-error: true

      - name: Snyk Test — server (fail on high+)
        working-directory: server
        run: snyk test --severity-threshold=high

      - name: Snyk Test — client (fail on high+)
        working-directory: client
        run: snyk test --severity-threshold=high
